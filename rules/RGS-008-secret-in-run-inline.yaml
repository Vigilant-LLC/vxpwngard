id: RGS-008
name: "Secret Directly Interpolated in run Block"
severity: high
description: >
  A `${{ secrets.* }}` expression or `${{ github.token }}` or `${{ env.GITHUB_TOKEN }}`
  appears directly inside a `run:` block's shell script rather than being passed via
  the `env:` mapping. When secrets are interpolated directly into `run:` blocks using
  `${{ }}` expressions, they are literally pasted into the shell script as plain text
  before execution. This creates multiple risks: (1) the secret value becomes part of
  the shell script text, potentially visible in error messages, debug logs, or process
  listings; (2) if the secret value contains shell metacharacters (quotes, backticks,
  dollar signs, semicolons), it can break the shell script syntax or cause unintended
  command execution; (3) the secret is exposed to shell history and /proc filesystem;
  (4) any expression injection vulnerability in the same `run:` block gains direct
  access to the secret value. GitHub's log masking only redacts known secret values
  from output, but cannot prevent secrets from being captured via side channels when
  they are embedded in the script source.

tags:
  - secrets
  - injection

attack_scenario: >
  A workflow directly interpolates a deployment token in a run block:
  `curl -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" https://api.example.com/deploy`.
  An attacker finds an expression injection vulnerability in the same job (e.g., via PR
  title interpolation in another step). Because the secret is literally embedded in the
  shell script text, the attacker can read it from the runner's process environment or
  from the /proc filesystem. Even without an injection vulnerability, if the secret
  value happens to contain a double quote or backtick, the shell script breaks in
  unexpected ways -- potentially exposing the partial secret in error messages or
  causing the curl command to be interpreted differently than intended. Additionally,
  if `set -x` (bash debug mode) is enabled anywhere in the script, all commands including
  the interpolated secret are printed to stdout, and GitHub's masking may not catch
  every variant (e.g., base64-encoded, URL-encoded, or split across lines).

real_world_incident: >
  GitHub Security Lab has documented multiple cases where secrets were exposed through
  direct interpolation in run blocks. In several incidents, workflows with `set -x`
  or verbose error output leaked secret values to workflow logs, which were then
  accessible to anyone with read access to the repository (for public repos, this means
  the entire internet). In other cases, secrets containing special characters caused
  shell parsing errors that exposed partial secret values. The GitHub Actions security
  hardening guide specifically warns against this pattern and recommends using the env
  mapping approach instead.

fix: |
  **Always pass secrets through the `env:` mapping, never inline them in `run:` blocks.**

  **Vulnerable pattern:**

  ```yaml
  # DANGEROUS: Secret is literally pasted into the shell script
  - run: |
      curl -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
        https://api.example.com/deploy

  # DANGEROUS: Token interpolated directly
  - run: |
      echo "${{ secrets.NPM_TOKEN }}" | npm login

  # DANGEROUS: github.token in run block
  - run: |
      gh pr comment --body "Deployed" --repo ${{ github.repository }}
    env:
      GITHUB_TOKEN: ${{ github.token }}  # This part is fine
  # But this is NOT fine:
  - run: |
      curl -H "Authorization: token ${{ github.token }}" https://api.github.com/repos/...
  ```

  **Safe pattern using env mapping:**

  ```yaml
  # SAFE: Secret passed as environment variable
  - run: |
      curl -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
        https://api.example.com/deploy
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

  # SAFE: NPM token via env
  - name: Publish to npm
    run: npm publish
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # SAFE: GitHub token via env
  - run: |
      gh pr comment --body "Deployed" --repo "${GITHUB_REPOSITORY}"
    env:
      GITHUB_TOKEN: ${{ github.token }}
  ```

  **For GitHub CLI (gh), use the standard env var:**

  ```yaml
  # SAFE: gh CLI automatically reads GITHUB_TOKEN from env
  - run: gh pr list --repo "${GITHUB_REPOSITORY}"
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  ```

  **For Docker login and registry operations:**

  ```yaml
  # SAFE: Pass via stdin, not command line
  - run: echo "${REGISTRY_PASSWORD}" | docker login ghcr.io -u "${REGISTRY_USER}" --password-stdin
    env:
      REGISTRY_USER: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  ```

  **Key principles:**
  - Never use `${{ secrets.* }}` inside `run:` blocks
  - Always use the `env:` mapping to pass secrets as environment variables
  - Reference secrets in shell scripts as `${VAR_NAME}`, not `${{ }}` expressions
  - This also protects against secrets with special characters breaking shell syntax
  - Use `INPUT_*` env vars for action inputs that receive secrets

