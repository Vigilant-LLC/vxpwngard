project_name: vxpwngard

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - main: ./cmd/vxpwngard
    binary: vxpwngard
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: Vigilant-LLC
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/Vigilant-LLC/vxpwngard"
    description: "CI/CD source-to-sink vulnerability scanner for GitHub Actions"
    license: "Apache-2.0"
    install: |
      bin.install "vxpwngard"
    test: |
      system "#{bin}/vxpwngard", "version"

release:
  github:
    owner: Vigilant-LLC
    name: vxpwngard
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
