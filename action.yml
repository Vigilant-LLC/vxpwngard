name: Runner Guard
description: Detect CI/CD source-to-sink injection vulnerabilities including AI config attacks
author: Vigilant
inputs:
  fail-on:
    description: Minimum severity to fail the check
    default: high
  sarif-upload:
    description: Upload SARIF to GitHub Code Scanning
    default: 'true'
branding:
  icon: shield
  color: red
runs:
  using: composite
  steps:
    - name: Install Runner Guard
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/Vigilant-LLC/runner-guard/main/install.sh | bash
    - name: Scan
      shell: bash
      run: runner-guard scan . --format sarif --output runner-guard.sarif --fail-on ${{ inputs.fail-on }}
    - name: Upload SARIF
      if: always() && inputs.sarif-upload == 'true'
      uses: github/codeql-action/upload-sarif@3b054500189c7b3ca9be7cd4f035ca58c00776cd # v3
      with:
        sarif_file: runner-guard.sarif
