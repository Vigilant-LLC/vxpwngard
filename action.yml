name: VXPwngard
description: Detect CI/CD source-to-sink injection vulnerabilities including AI config attacks
author: Vigilant
inputs:
  fail-on:
    description: Minimum severity to fail the check
    default: high
  sarif-upload:
    description: Upload SARIF to GitHub Code Scanning
    default: 'true'
branding:
  icon: shield
  color: red
runs:
  using: composite
  steps:
    - name: Install VXPwngard
      shell: bash
      run: |
        curl -sSfL https://raw.githubusercontent.com/Vigilant-LLC/vxpwngard/main/install.sh | bash
    - name: Scan
      shell: bash
      run: vxpwngard scan . --format sarif --output vxpwngard.sarif --fail-on ${{ inputs.fail-on }}
    - name: Upload SARIF
      if: inputs.sarif-upload == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: vxpwngard.sarif
